<div class="login-wrapper">

    <div class="auth-card">

        <h1 class="title">
            Welcome Back
        </h1>

        <p class="subtitle">
            Sign in to continue
        </p>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <!-- Email -->

            <div class="form-group">

                <label>Email</label>

                <input class="auth-input" type="email" formControlName="email" placeholder="john@example.com" />

                <small *ngIf="
            loginForm.get('email')?.touched &&
            loginForm.get('email')?.invalid
          ">
                    Please enter a valid email.
                </small>

            </div>

            <!-- Password -->

            <div class="form-group">

                <label>Password</label>

                <div class="password-wrapper">

                    <input class="auth-input" [type]="showPassword ? 'text' : 'password'" formControlName="password"
                        placeholder="Enter password" />

                    <button type="button" class="toggle-btn" (click)="togglePassword()">
                        {{ showPassword ? 'Hide' : 'Show' }}
                    </button>

                </div>

                <small *ngIf="
            loginForm.get('password')?.touched &&
            loginForm.get('password')?.invalid
          ">
                    Password must be at least 8 characters.
                </small>

            </div>

            <div *ngIf="errorMessage" class="error-box">
                {{ errorMessage }}
            </div>

            <button type="submit" class="auth-btn login-btn" [disabled]="
          loginForm.invalid ||
          authService.isLoading()
        ">

                <span *ngIf="!authService.isLoading()">
                    Sign In
                </span>

                <span *ngIf="authService.isLoading()">
                    Signing In...
                </span>

            </button>

        </form>

        <div class="footer-link">

            Don't have an account?

            <a routerLink="/register">
                Create one
            </a>

        </div>

    </div>

</div>
